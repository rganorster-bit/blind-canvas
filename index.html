<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>קווים עיוורים</title>

<style>

body{
font-family:Arial,sans-serif;
background:#0D47A1;
color:white;
text-align:center;
padding:20px;
margin:0;
}

.container{
max-width:900px;
margin:auto;
}

h1{
background:#FFD400;
color:black;
padding:15px;
border-radius:15px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:20px;
margin-top:20px;
}

button{
background:#FFD400;
color:black;
border:none;
padding:15px 25px;
font-size:20px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
margin:10px;
}

#challenge{
font-size:42px;
font-weight:bold;
margin:20px;
min-height:60px;
}

#timer{
font-size:80px;
font-weight:bold;
color:#0D47A1;
margin:20px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>🎨 קווים עיוורים</h1>

<div class="card">

<div id="challenge">
לחצו על "משימה חדשה"
</div>

<button onclick="newChallenge()">
🎲 משימה חדשה
</button>

<div id="timer">60</div>

<button id="answerBtn" class="hidden" onclick="showAnswer()">
👀 חשוף תשובה
</button>

<h2 id="answer"></h2>

<button onclick="location.reload()">
🔄 משחק חדש
</button>

</div>

</div>

<script>

const challenges = [

"שמש","ירח","בית","עץ","פרח","חתול","כלב","דג","ציפור","גלידה",
"כדורגל","מכונית","אופניים","עפיפון","לב","רובוט","דרקון","חד קרן",
"טירה","טיל","גמל","פיל","קוף","כריש","פינגווין","טרקטור","סירה",
"רכבת","מטוס","חללית","אי בודד","פארק שעשועים","חוף ים","קרקס",
"מסיבת יום הולדת","בית ספר","גן חיות","קמפינג","ג'ונגל","חתונה",
"תרנגולת רוקדת","פיל על קורקינט","חתול משחק כדורגל",
"כלב מנגן בגיטרה","כריש עם משקפיים","קוף אוכל פיצה",
"סבתא על סקייטבורד","חד קרן עושה סלפי","ג'ירפה במכונית",
"מגדל אייפל","צוללת","טנק","מפלצת","אוצר",
"מפה","מזוודה","מחשב","טלפון","שעון",
"מטרייה","משקפיים","כובע","גיטרה","תוף",
"ספר","עיפרון","מצלמה","אופנוע","מזרקה",
"דולפין","צב","תנין","אריה","זברה"
];

let currentChallenge = "";
let countdown;

function newChallenge(){

clearInterval(countdown);

currentChallenge =
challenges[Math.floor(Math.random()*challenges.length)];

document.getElementById("challenge").innerHTML =
currentChallenge;

document.getElementById("answer").innerHTML = "";

document.getElementById("answerBtn")
.classList.add("hidden");

let time = 60;

document.getElementById("timer").innerHTML = time;

countdown = setInterval(function(){

time--;

document.getElementById("timer").innerHTML = time;

if(time <= 0){

clearInterval(countdown);

document.getElementById("timer").innerHTML =
"⏰ נגמר הזמן!";

document.getElementById("answerBtn")
.classList.remove("hidden");

}

},1000);

}

function showAnswer(){

document.getElementById("answer").innerHTML =
"✅ המשימה הייתה: " + currentChallenge;

}

</script>

</body>
</html>
